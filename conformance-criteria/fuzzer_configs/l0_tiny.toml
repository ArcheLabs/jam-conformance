# L0 -- Smoke test (tiny spec)
#
# Minimal sanity run: 32 steps, empty workload, no mutations, no Safrole.

jam_spec = "tiny"
profile = "empty"
safrole = false
max_steps = 32
max_work_items = 0
max_mutations = 0
# 15 seconds timeout
remote_timeout = 15

# Shared
source = "local"
# Overwrite via `--target-sock` CLI option if required
target_sock = "/tmp/jam_fuzz/fuzz.sock"
step_period = 0
verbosity = 2
trace_dir = "traces"
skip_slots = false
single_step = false
show_config = false
pause_on_error = false
trace_traces = false
pvm_interpreter_backend = true
